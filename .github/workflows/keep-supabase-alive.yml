name: Keep Supabase Alive

# Jalan otomatis setiap hari Senin jam 03:00 UTC (10:00 WIB),
# supaya project Supabase tidak pernah dianggap "tidak aktif" oleh sistem mereka
# (batas mereka adalah 7 hari tanpa aktivitas sama sekali).
# Bisa juga dijalankan manual kapan saja lewat tab "Actions" di GitHub.
on:
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch: {}

jobs:
  ping-database:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        run: |
          curl -s -o /dev/null -w "HTTP Status: %{http_code}\n" \
            "https://xrkzwfxlhdcgqyxyptbu.supabase.co/rest/v1/sekolah?select=id&limit=1" \
            -H "apikey: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhya3p3ZnhsaGRjZ3F5eHlwdGJ1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM1MzgyOTQsImV4cCI6MjA5OTExNDI5NH0.v4mx_OUJ2CHXpqOpxJlRG2jtZG7DXY5rx0glxiLKHgk" \
            -H "Authorization: Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhya3p3ZnhsaGRjZ3F5eHlwdGJ1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM1MzgyOTQsImV4cCI6MjA5OTExNDI5NH0.v4mx_OUJ2CHXpqOpxJlRG2jtZG7DXY5rx0glxiLKHgk"
          echo "Ping selesai — database SiPelanggar tetap aktif."
